<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#2d0a0a"/>
      <stop offset="100%" stop-color="#0e0404"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0a0303"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="face-clip">
      <circle cx="256" cy="296" r="148"/>
    </clipPath>
  </defs>

  <!-- App icon background (rounded square) -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle vignette border -->
  <rect width="512" height="512" rx="108" fill="none" stroke="#ef444418" stroke-width="3"/>

  <!-- Crown / button on top of watch -->
  <rect x="236" y="92" width="40" height="22" rx="11" fill="#ef4444" filter="url(#softglow)"/>
  <!-- Neck connecting crown to body -->
  <path d="M 240 113 L 232 136 L 280 136 L 272 113 Z" fill="#c53030"/>

  <!-- Side lap/split buttons -->
  <rect x="76" y="252" width="26" height="14" rx="7" fill="#c53030"/>
  <rect x="410" y="252" width="26" height="14" rx="7" fill="#c53030"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="296" r="158" fill="none" stroke="#ef444428" stroke-width="20"/>

  <!-- Watch body ring -->
  <circle cx="256" cy="296" r="148" fill="none" stroke="#ef4444" stroke-width="12" filter="url(#glow)"/>

  <!-- Watch face -->
  <circle cx="256" cy="296" r="134" fill="url(#face)"/>

  <!-- Tick marks — 12 positions -->
  <!-- Major: 12, 3, 6, 9 -->
  <g stroke="#ef444490" stroke-linecap="round">
    <!-- 12 --> <line x1="256" y1="174" x2="256" y2="190" stroke-width="5"/>
    <!-- 3  --> <line x1="378" y1="296" x2="362" y2="296" stroke-width="5"/>
    <!-- 6  --> <line x1="256" y1="418" x2="256" y2="402" stroke-width="5"/>
    <!-- 9  --> <line x1="134" y1="296" x2="150" y2="296" stroke-width="5"/>
  </g>
  <!-- Minor ticks (remaining 8) -->
  <g stroke="#ef444445" stroke-linecap="round" stroke-width="3">
    <!-- 1 --> <line x1="317" y1="188" x2="310" y2="200"/>
    <!-- 2 --> <line x1="364" y1="235" x2="352" y2="242"/>
    <!-- 4 --> <line x1="364" y1="357" x2="352" y2="350"/>
    <!-- 5 --> <line x1="317" y1="404" x2="310" y2="392"/>
    <!-- 7 --> <line x1="195" y1="404" x2="202" y2="392"/>
    <!-- 8 --> <line x1="148" y1="357" x2="160" y2="350"/>
    <!-- 10--> <line x1="148" y1="235" x2="160" y2="242"/>
    <!-- 11--> <line x1="195" y1="188" x2="202" y2="200"/>
  </g>

  <!-- Split line across face — the core speedrun concept -->
  <line x1="122" y1="296" x2="390" y2="296" stroke="#ef444438" stroke-width="1.5" stroke-dasharray="7 5" clip-path="url(#face-clip)"/>

  <!-- Minute hand (big white hand, pointing to ~10) -->
  <line x1="256" y1="296" x2="197" y2="194" stroke="#fef2f2" stroke-width="10" stroke-linecap="round" filter="url(#softglow)"/>

  <!-- Second / split hand (thin red, pointing to ~1:30 = fast split) -->
  <line x1="256" y1="296" x2="308" y2="183" stroke="#ef4444" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Counter-weight tail -->
  <line x1="256" y1="296" x2="242" y2="330" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="256" cy="296" r="12" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="256" cy="296" r="5" fill="#1a0a0a"/>
</svg>
